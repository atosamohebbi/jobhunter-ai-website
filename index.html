<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JobHunter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>Find roles that actually match you</h1>
      <p class="subtitle">Not just keywords. Real fit based on your experience.</p>
    </div>

    <div class="meta">
      <p id="last-updated"></p>
    </div>

    <div class="filters">
      <button onclick="setFilter('all')" class="active">All</button>
      <button onclick="setFilter('product')">Product</button>
      <button onclick="setFilter('ux')">UX/UI</button>
    </div>

    <p id="loading">Scanning job sources and ranking matches...</p>

    <div id="jobs-container"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
